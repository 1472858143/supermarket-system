server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: supermarket-inventory
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:admin123}
    user-username: ${BOOTSTRAP_USER_USERNAME:user}
    user-password: ${BOOTSTRAP_USER_PASSWORD:user123}
